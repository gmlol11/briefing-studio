# Edge reverse proxy for the Yandex production stack (docker-compose.yandex.yml).
#
# Single public entrypoint:
#   /       -> frontend service (static SPA, its own nginx)
#   /api/   -> backend service (FastAPI), prefix preserved
#   /health -> backend /health passthrough
#
# TLS is expected to be terminated here or upstream (Yandex ALB / a TLS-enabled
# nginx). This file is HTTP-only; see docs/deploy-yandex-cloud.md for TLS notes.

server {
    listen 80;
    server_name _;

    # Uploaded/generated documents can be large (DOCX/PDF export); allow bigger bodies.
    client_max_body_size 25m;

    # Frontend SPA. The frontend image serves index.html with client-side routing.
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API -> backend. No trailing path on proxy_pass, so the /api/ prefix is
    # preserved and requests reach the backend as /api/... (its routes live there).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PDF export via Chromium can take a while — give the backend room.
        proxy_read_timeout 120s;
    }

    # Convenience: expose backend health through the public entrypoint.
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}
