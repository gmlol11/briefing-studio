# nginx: single public entrypoint for the prod stack.
# Serves the built SPA and proxies /api -> backend (same-origin).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: deep links (/brief/:id/review, /brands/...) must resolve to
    # index.html instead of 404 — the React router handles them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy. proxy_pass has NO trailing path, so the matched /api/ prefix is
    # preserved and requests reach the backend as /api/... (its routes live there).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional convenience: expose backend health through the public entrypoint.
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}
