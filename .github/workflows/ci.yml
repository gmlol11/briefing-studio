name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+psycopg://briefing:briefing@localhost:5432/briefing
      TEST_DATABASE_URL: postgresql+psycopg://briefing:briefing@localhost:5432/briefing_test
      APP_ENV: local
      VITE_API_URL: http://localhost:8000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: briefing
          POSTGRES_PASSWORD: briefing
          POSTGRES_DB: briefing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U briefing -d briefing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create test database
        run: PGPASSWORD=briefing psql -h localhost -U briefing -d briefing -c 'CREATE DATABASE briefing_test;'

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Install Playwright chromium (backend, for PDF export)
        working-directory: backend
        run: python -m playwright install --with-deps chromium

      - name: Alembic upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Pytest (no-DB + DB)
        working-directory: backend
        run: pytest -q

      - name: Seed demo data
        working-directory: backend
        run: python scripts/seed_demo.py --reset

      - name: Start backend and wait for health
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "backend is up"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; cat /tmp/uvicorn.log; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
