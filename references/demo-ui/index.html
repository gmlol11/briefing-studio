<style>
/* Системный стек — работает мгновенно пока грузятся кастомные шрифты */
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

/* ======================================================================
   ДИЗАЙН-ТОКЕНЫ — точно из nestor.letopis.ai
   ====================================================================== */
:root{
  --bg:#fbfeff;
  --bg-modal:#ececec;
  --bg-modal-light:#f0efee;
  --bg-select:#fff4eb;
  --bg-select-hover:#ff621b1a;
  --bg-input:#ffffffb2;
  --bg-chat-input:#fff6;
  --bg-chat-input-active:#fffc;
  --bg-selected:#ffffff80;
  --card-bg:#ffffff4d;
  --card-bg-light:#fff9;
  --muted:#e9e9e9;
  --muted-hard:#565656;
  --muted-hover:#d1d1d1;
  --text:#2b2b2b;
  --text-muted:#959595;
  --text-hard-muted:#d4d4d4;
  --accent:#ff621b;
  --accent-text:#ff7000;
  --accent-hover:#ff8d0a;
  --accent-disabled:#ff621b4d;
  --accent-mild:#ffdeca;
  --accent-mild-bg:#ffdeca;
  --accent-soft:#fdebe2;
  --table-sep:#eeeef0;
  --shadow:0 8px 24px #1414140f;
  --shadow-card:0 4px 16px #1414140a;
  --alert-error-bg:#ffe1ed;
  --alert-success-bg:#caf1c3;
  --radius-52:52px;
  --radius-32:32px;
  --radius-24:24px;
  --radius-16:16px;
  --radius-12:12px;
  --radius-lg:12px;
  --radius-md:8px;
  --gap:20px;
  --font-family:"Raleway",sans-serif;
  --font-family-add:"Inter",sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Raleway',sans-serif;
  font-weight:500;
  font-variant-numeric:lining-nums;
  font-feature-settings:"lnum";
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background-color:#eef5f6;
  background:linear-gradient(130deg,#fff2e8,#ffdbc0,#ffba86);
  min-height:100vh;
  color:var(--text);
  font-size:14px;
  line-height:1.4;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.hidden{display:none !important}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ffffff66;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#ffffff99}

/* ======================================================================
   LAYOUT
   ====================================================================== */
.app{
  display:flex;
  gap:10px;
  min-height:100vh;
  padding:10px 18px 10px 0;
}
.sidebar{
  display:flex;
  flex-direction:column;
  height:calc(100vh - 20px);
  position:sticky;
  top:10px;
  margin-left:18px;
  width:248px;
  flex:0 0 248px;
  padding:14px 4px 8px;
}
.main{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ======================================================================
   SIDEBAR
   ====================================================================== */
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:4px 16px 18px;
  cursor:pointer;
}
.brand-mark{
  width:36px;height:36px;
  border-radius:12px;
  background:linear-gradient(135deg,#ff8d0a,#ff621b 55%,#cc4d15);
  display:grid;place-items:center;
  color:#fff;
  font-family:'Raleway',sans-serif;font-weight:800;font-size:18px;
  letter-spacing:.4px;
  box-shadow:inset 0 0 0 1px #ffffff33, 0 6px 16px rgba(255,98,27,.25);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-title{font-family:'Raleway',sans-serif;font-weight:700;font-size:16px;color:var(--text)}
.brand-sub{font-size:10.5px;color:var(--muted-hard);letter-spacing:.08em;text-transform:uppercase;font-weight:600}

.ws{
  margin:0 12px 10px;
  padding:10px 14px;
  background:var(--card-bg-light);
  border:1px solid #fff;
  border-radius:var(--radius-16);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  cursor:pointer;
  transition:background .18s;
}
.ws:hover{background:#fff}
.ws-name{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.ws-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.ws-value{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-caret{color:var(--muted-hard)}

.new-session{
  margin:0 12px 12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 16px;
  background:var(--accent);
  color:#fff;border:none;
  border-radius:var(--radius-24);
  font-weight:600;font-size:14px;
  transition:background .18s, transform .12s;
  box-shadow:0 6px 18px rgba(255,98,27,.28);
}
.new-session:hover{background:var(--accent-hover);transform:translateY(-1px)}
.new-session:active{background:#cc4d15;transform:translateY(0)}
.new-session svg{width:16px;height:16px}

.nav{padding:6px 12px 0}
.nav-title{
  font-size:10px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  padding:14px 14px 6px;
}
.nav ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
.nav li{display:block}
.nav a{
  display:flex;align-items:center;
  gap:12px;padding:0 14px;
  height:44px;
  border-radius:99px;
  color:var(--text);
  font-size:14.5px;font-weight:500;
  text-decoration:none;
  transition:background-color .2s ease-in-out;
  cursor:pointer;
  white-space:nowrap;
}
.nav a svg{width:18px;height:18px;flex:0 0 18px;color:var(--text);transition:color .2s}
.nav a:hover{background:var(--card-bg)}
.nav li.active a{background:var(--accent-text);color:#fff}
.nav li.active a svg{color:#fff}
.nav .badge{
  margin-left:auto;
  display:inline-flex;align-items:center;
  padding:1px 8px;border-radius:99px;
  font-size:10.5px;font-weight:700;
  background:var(--accent-mild);color:var(--accent-text);
}
.nav li.active a .badge{background:#ffffff33;color:#fff}

.recent{flex:1;overflow:auto;padding:0 12px;margin-top:8px}
.recent-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  border-radius:var(--radius-16);
  cursor:pointer;
  transition:background .2s;
}
.recent-item:hover{background:var(--card-bg)}
.recent-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:0 0 8px;box-shadow:inset 0 0 0 1px #ffffff80}
.recent-dot.live{background:var(--accent);box-shadow:0 0 0 3px rgba(255,98,27,.18)}
.recent-text{display:flex;flex-direction:column;min-width:0;line-height:1.25}
.recent-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.recent-meta{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

.profile{
  margin:8px 12px 4px;
  padding:8px;
  background:var(--card-bg);
  border:1px solid #fff;
  border-radius:99px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  transition:background .2s;
}
.profile:hover{background:var(--card-bg-light)}
.profile-avatar{
  width:32px;height:32px;border-radius:50%;
  background:#ff621b1a;
  display:grid;place-items:center;
  color:var(--accent-text);font-weight:700;font-size:12px;
  flex:0 0 32px;
  overflow:hidden;
}
.profile-name{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-gear{color:var(--muted-hard);padding:4px;display:grid;place-items:center}

/* ======================================================================
   TOPBAR / CRUMBS
   ====================================================================== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;
  background:var(--card-bg-light);
  border:1px solid #fff;
  border-radius:var(--radius-24);
  position:sticky;top:10px;z-index:10;
  backdrop-filter:blur(8px);
}
.crumbs{display:flex;align-items:center;gap:8px;color:var(--text);font-size:13.5px;font-weight:500;min-width:0}
.crumbs strong{color:var(--text);font-weight:700}
.crumbs .sep{color:var(--text-hard-muted)}
.topbar-right{display:flex;align-items:center;gap:8px}

.status-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;background:#fff;border:1px solid var(--alert-success-bg);
  color:#2c8d3e;border-radius:99px;font-size:12px;font-weight:600;
}
.status-pill .pulse{width:7px;height:7px;border-radius:50%;background:#3aa84e;animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,168,78,.45)}70%{box-shadow:0 0 0 8px rgba(58,168,78,0)}100%{box-shadow:0 0 0 0 rgba(58,168,78,0)}}

.ghost-btn{
  background:#fff;border:1px solid var(--muted);color:var(--text);
  border-radius:var(--radius-16);padding:9px 14px;
  font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;
  transition:background .18s,border-color .18s,color .18s;
}
.ghost-btn:hover{background:var(--accent-soft);border-color:var(--accent-mild);color:var(--accent-text)}
.primary-btn{
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-24);
  padding:0 22px;height:48px;
  font-size:15px;font-weight:600;
  display:inline-flex;align-items:center;gap:10px;
  transition:background .2s ease;
  box-shadow:0 6px 18px rgba(255,98,27,.22);
}
.primary-btn:hover{background:var(--accent-hover)}
.primary-btn:active{background:#cc4d15}
.primary-btn[disabled]{background:var(--accent-disabled);box-shadow:none;cursor:not-allowed}
.primary-btn.lg{height:64px;font-size:16px;padding:0 28px;border-radius:var(--radius-24)}
.secondary-btn{
  background:var(--bg-select);color:var(--accent-text);
  border:1px solid var(--accent-mild);
  border-radius:var(--radius-16);padding:9px 16px;
  font-size:13.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;
  transition:background .18s;
}
.secondary-btn:hover{background:var(--accent-soft)}

/* ======================================================================
   HOME (Nestor)
   ====================================================================== */
.home-grid{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:10px;
  flex:1;
}
.glass{
  background:#fff3;
  border:1px solid #fff;
  border-radius:var(--radius-32);
  padding:18px;
  display:flex;flex-direction:column;
  min-width:0;
}
.glass.providers{
  background:radial-gradient(closest-corner,#fff,#8eadb980);
}
.section-title{
  font-family:'Raleway',sans-serif;font-weight:400;font-size:24px;
  color:var(--text);
  padding:12px 12px 8px;
  margin:0 0 4px;
}
.section-title .a{color:var(--accent-text);font-weight:600}

.banner-card{
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  background:linear-gradient(110deg,#ff6f8f 0%,#ffb38a 55%,#ff8fa3 100%);
  border-radius:var(--radius-24);
  padding:22px 26px;
  color:#fff;
  margin-bottom:14px;
  box-shadow:0 12px 32px rgba(255,111,143,.25);
}
.banner-card .left{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.banner-card .eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  background:#ffffff33;color:#fff;
  padding:4px 10px;border-radius:99px;
  font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  width:fit-content;
  backdrop-filter:blur(8px);
}
.banner-card .eyebrow .d{width:6px;height:6px;border-radius:50%;background:#fff}
.banner-card h2{
  margin:4px 0 0;
  font-family:'Raleway',sans-serif;font-weight:300;font-size:30px;line-height:1;letter-spacing:-.01em;
}
.banner-card h2 b{font-weight:700}
.banner-card p{margin:0;font-weight:400;font-size:14px;max-width:520px;opacity:.95}
.banner-card .right{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.banner-card .launch{
  background:#fff;color:var(--accent);
  border:none;border-radius:var(--radius-24);
  padding:0 22px;height:56px;
  font-size:15px;font-weight:700;
  display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
  transition:transform .15s, background .15s;
}
.banner-card .launch:hover{transform:translateY(-2px);background:#fff8f0}

.scripts-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
  flex:1;
}
.script-card{
  background:var(--bg-input);
  border:1px solid #fff;
  border-radius:var(--radius-12);
  padding:16px;
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;
  transition:background .18s, transform .12s, box-shadow .18s;
  min-height:170px;
}
.script-card:hover{background:#fff;transform:translateY(-2px);box-shadow:var(--shadow-card)}
.script-card.featured{background:linear-gradient(135deg,#fff4eb,#ffe1cc)}
.script-card .cover{
  width:48px;height:48px;border-radius:14px;
  background:#ff621b1a;
  display:grid;place-items:center;color:var(--accent);
}
.script-card .cover svg{width:24px;height:24px}
.script-card h4{margin:0;font-size:16px;font-weight:600;color:#000}
.script-card p{margin:0;font-size:13px;color:#000;line-height:1.4}
.script-card .steps{
  margin-top:auto;
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;color:#000;font-weight:600;
}
.script-card .steps .demo-pill{
  background:var(--accent);color:#fff;
  padding:3px 10px;border-radius:99px;
  font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
}

.providers-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
  margin-top:8px;
}
.provider-card{
  background:var(--card-bg-light);
  border:1px solid #fff;
  border-radius:var(--radius-16);
  padding:14px;
  display:flex;flex-direction:column;gap:8px;
  cursor:pointer;
  transition:background .18s, transform .12s;
}
.provider-card:hover{background:#fff;transform:translateY(-2px)}
.provider-card .icn{
  width:38px;height:38px;border-radius:12px;
  background:#ff621b1a;color:var(--accent-text);
  display:grid;place-items:center;
}
.provider-card .icn svg{width:20px;height:20px}
.provider-card h5{margin:0;font-size:14px;font-weight:600;color:var(--text)}
.provider-card p{margin:0;font-size:12px;color:var(--text-muted)}

.last-chats{
  display:flex;flex-direction:column;gap:6px;
  margin-top:8px;
  overflow:auto;
}
.last-chat{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-16);
  background:var(--card-bg);
  border:1px solid #fff;
  cursor:pointer;transition:background .18s;
}
.last-chat:hover{background:#fff}
.last-chat .ic{
  width:30px;height:30px;border-radius:9px;background:#ff621b1a;color:var(--accent);
  display:grid;place-items:center;flex:0 0 30px;
}
.last-chat .ic svg{width:16px;height:16px}
.last-chat .t{display:flex;flex-direction:column;min-width:0;line-height:1.2}
.last-chat .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.last-chat .m{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ======================================================================
   STUDIO START
   ====================================================================== */
.studio{
  flex:1;
  background:#fff3;
  border:1px solid #fff;
  border-radius:var(--radius-32);
  padding:36px 24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:auto;
}
.studio-hero{width:100%;max-width:780px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
.studio-mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,#ff8d0a,#ff621b,#cc4d15);
  display:grid;place-items:center;color:#fff;
  font-family:'Raleway',sans-serif;font-weight:800;font-size:26px;
  box-shadow:0 12px 30px rgba(255,98,27,.28);
}
.studio-hero h1{
  font-family:'Raleway',sans-serif;font-weight:300;
  font-size:48px;line-height:1;letter-spacing:-.01em;margin:0;
  color:var(--text);
}
.studio-hero h1 b{font-weight:700}
.studio-hero .lead{
  font-size:16px;color:var(--muted-hard);font-weight:500;
  max-width:560px;margin:0;line-height:1.5;
}
.quick-cmds{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 16px;
  background:var(--bg-chat-input);
  border:1px solid #fff;
  border-radius:99px;
  font-size:13.5px;font-weight:500;
  color:var(--text);
  transition:background .18s,border-color .18s,color .18s;
  cursor:pointer;
}
.chip:hover{background:#fff;border-color:var(--accent-mild);color:var(--accent-text)}
.chip.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.primary:hover{background:var(--accent-hover);color:#fff;border-color:var(--accent-hover)}

.input-shell{
  width:100%;max-width:780px;
  background:var(--bg-chat-input);
  border:1px solid #fff;
  border-radius:var(--radius-24);
  padding:12px 12px 12px 18px;
  display:flex;align-items:flex-end;gap:10px;
  box-shadow:0 14px 36px #14141414;
  transition:background .18s;
}
.input-shell:focus-within{background:var(--bg-chat-input-active)}
.input-shell textarea{
  flex:1;border:none;outline:none;resize:none;background:transparent;
  font-family:'Raleway',sans-serif;font-weight:500;font-size:15px;line-height:1.5;
  color:var(--text);
  min-height:28px;max-height:160px;
}
.input-shell textarea::placeholder{color:var(--text-muted)}
.input-send{
  width:42px;height:42px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  display:grid;place-items:center;flex:0 0 42px;
  transition:background .18s,transform .12s;
}
.input-send:hover{background:var(--accent-hover)}
.input-send:active{background:#cc4d15;transform:scale(.96)}
.input-send[disabled]{background:var(--accent-disabled);cursor:not-allowed}

/* ======================================================================
   FLOW — chat + stepper
   ====================================================================== */
.chat-root{
  flex:1;display:flex;flex-direction:column;gap:10px;min-height:0;
}
.stepper-wrap{
  display:flex;align-items:center;gap:8px;
  padding:12px 18px;
  background:var(--card-bg-light);
  border:1px solid #fff;
  border-radius:var(--radius-24);
  overflow-x:auto;
  scrollbar-width:thin;
}
.step-pip{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:99px;
  background:var(--card-bg);
  color:var(--muted-hard);
  font-size:12.5px;font-weight:600;
  white-space:nowrap;
  border:1px solid transparent;
}
.step-pip .num{
  width:20px;height:20px;border-radius:50%;
  background:#fff;color:var(--muted-hard);
  font-size:11px;font-weight:700;
  display:grid;place-items:center;
  border:1px solid var(--muted);
}
.step-pip.done{background:var(--alert-success-bg);color:#2c8d3e;border-color:#9fde9f}
.step-pip.done .num{background:#3aa84e;color:#fff;border-color:#3aa84e}
.step-pip.active{background:#fff;color:var(--accent-text);border-color:var(--accent-mild);box-shadow:0 4px 12px rgba(255,98,27,.18)}
.step-pip.active .num{background:var(--accent);color:#fff;border-color:var(--accent)}
.step-arrow{color:var(--text-hard-muted);flex:0 0 auto}

.chat-area{
  flex:1;display:flex;flex-direction:column;min-height:0;
  background:#fff3;
  border:1px solid #fff;
  border-radius:var(--radius-32);
  overflow:hidden;
}
.chat-scroll{flex:1;overflow:auto;padding:22px 24px 24px}
.chat-stage{max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.msg{display:flex;gap:12px;align-items:flex-start}
.msg .ava{
  width:36px;height:36px;border-radius:12px;flex:0 0 36px;
  display:grid;place-items:center;
  font-size:13px;font-weight:700;color:#fff;
  font-family:'Raleway',sans-serif;
}
.msg.ai .ava{background:linear-gradient(135deg,#ff8d0a,#ff621b,#cc4d15);box-shadow:0 4px 12px rgba(255,98,27,.25)}
.msg.user .ava{background:linear-gradient(135deg,#475a6e,#1f2e3a)}

.msg .bubble{
  flex:1;min-width:0;
  background:#fff;
  border:1px solid #ffffffcc;
  border-radius:var(--radius-24);
  padding:16px 18px;
  box-shadow:var(--shadow-card);
}
.msg.user{flex-direction:row-reverse}
.msg.user .bubble{
  background:linear-gradient(135deg,#ff8d0a,#ff621b);
  color:#fff;border-color:transparent;
}
.msg .who{
  font-size:11px;color:var(--text-muted);
  font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:8px;
}
.msg.user .who{color:#ffffffcc}
.msg .body{font-size:14.5px;line-height:1.55;color:var(--text)}
.msg.user .body{color:#fff;font-weight:600}
.msg .body p{margin:0 0 8px}
.msg .body p:last-child{margin-bottom:0}
.msg .body strong{font-weight:700}

/* Карточки выбора */
.card-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.opt-card{
  background:#fff;border:1.5px solid var(--muted);
  border-radius:var(--radius-16);
  padding:14px;cursor:pointer;
  transition:border-color .18s,box-shadow .18s,transform .08s,background .18s;
  display:flex;flex-direction:column;gap:10px;
}
.opt-card:hover{border-color:var(--accent-mild);box-shadow:var(--shadow-card)}
.opt-card.selected{border-color:var(--accent);background:var(--bg-select);box-shadow:0 0 0 3px rgba(255,98,27,.12)}
.opt-head{display:flex;align-items:center;gap:10px}
.opt-logo{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#ff8d0a,#ff621b,#cc4d15);
  display:grid;place-items:center;
  color:#fff;font-family:'Raleway',sans-serif;font-weight:700;font-size:15px;
  flex:0 0 40px;overflow:hidden;
}
.opt-title{font-weight:700;font-size:14.5px;line-height:1.2;color:var(--text)}
.opt-meta{font-size:12.5px;color:var(--muted-hard);line-height:1.3;font-weight:500}
.opt-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;padding:4px 10px;border-radius:99px;
  background:#ff621b1a;color:var(--accent-text);font-weight:600;
}

/* Template card */
.template-card{
  background:#fff;border:1.5px solid var(--muted);
  border-radius:var(--radius-24);
  overflow:hidden;cursor:pointer;
  transition:border-color .18s,box-shadow .18s;
}
.template-card:hover{border-color:var(--accent-mild);box-shadow:var(--shadow-card)}
.template-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,98,27,.12)}
.tpl-preview{
  height:200px;position:relative;display:flex;
  align-items:stretch;justify-content:flex-start;
  padding:18px;gap:14px;
  background:linear-gradient(120deg,#fff4eb 0%,#ffd6b8 60%,#ffba86 100%);
}
.tpl-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;justify-content:center}
.tpl-zone{
  border:1.5px dashed #c75815;
  background:#ffffff80;
  border-radius:8px;padding:7px 10px;
  font-size:11px;color:#8d4117;font-weight:700;letter-spacing:.02em;
}
.tpl-zone.title{font-size:14px;padding:10px 12px;font-weight:700}
.tpl-zone.image{
  flex:0 0 100px;height:auto;
  border-color:#a04419;
  background:repeating-linear-gradient(45deg,#ffffff66,#ffffff66 6px,#ffe1cc66 6px,#ffe1cc66 12px);
  display:grid;place-items:center;text-align:center;font-size:11px;
}
.tpl-info{padding:14px 16px;border-top:1px solid var(--muted)}
.tpl-info h4{margin:0 0 4px;font-size:15px;font-weight:700;color:var(--text)}
.tpl-info p{margin:0;font-size:13px;color:var(--muted-hard)}

/* Чекбоксы ресайзов */
.check-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.check-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border:1.5px solid var(--muted);
  border-radius:var(--radius-16);
  background:#fff;cursor:pointer;
  transition:border-color .18s, background .18s;
}
.check-row:hover{border-color:var(--accent-mild)}
.check-row.checked{border-color:var(--accent);background:var(--bg-select)}
.check-box{
  width:20px;height:20px;border-radius:6px;
  border:1.5px solid var(--muted);
  background:#fff;display:grid;place-items:center;
  flex:0 0 20px;transition:background .18s,border-color .18s;
}
.check-row.checked .check-box{background:var(--accent);border-color:var(--accent)}
.check-row.checked .check-box svg{display:block}
.check-box svg{display:none;width:12px;height:12px;color:#fff}
.check-info{flex:1;min-width:0;display:flex;flex-direction:column}
.check-title{font-weight:700;font-size:14px;color:var(--text)}
.check-meta{font-size:12px;color:var(--muted-hard);font-weight:500}
.check-pixels{
  font-size:12.5px;color:var(--accent-text);font-weight:700;
  background:#fff;border:1px solid var(--accent-mild);
  padding:5px 12px;border-radius:99px;
}
.check-row.checked .check-pixels{background:#fff;color:var(--accent-text)}

/* Drop-зона */
.drop{
  border:2px dashed var(--muted);border-radius:var(--radius-24);
  padding:28px;text-align:center;background:#fff;
  transition:border-color .18s,background .18s;cursor:pointer;
}
.drop:hover{border-color:var(--accent);background:var(--bg-select)}
.drop.has-file{border-style:solid;border-color:#3aa84e;background:var(--alert-success-bg)}
.drop input{display:none}
.drop .ico{
  width:52px;height:52px;border-radius:14px;
  background:var(--bg-select);color:var(--accent-text);
  display:grid;place-items:center;margin:0 auto 10px;
}
.drop h5{margin:0 0 4px;font-size:15px;font-weight:700;color:var(--text)}
.drop p{margin:0;font-size:13px;color:var(--muted-hard)}
.file-card{
  margin-top:12px;display:flex;align-items:center;gap:12px;
  padding:12px;border:1px solid var(--muted);
  border-radius:var(--radius-16);background:#fff;
}
.file-thumb{
  width:60px;height:60px;border-radius:12px;
  background:var(--bg-select);overflow:hidden;flex:0 0 60px;
  display:grid;place-items:center;
}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-info{flex:1;min-width:0}
.file-name{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.file-meta{font-size:12px;color:var(--muted-hard);font-weight:500}
.progress{height:6px;background:var(--muted);border-radius:99px;overflow:hidden;margin-top:8px}
.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));width:0%;transition:width .25s ease-out}

/* Форма текста */
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.field input,.field textarea{
  border:1.5px solid var(--muted);
  background:#fff;
  border-radius:var(--radius-16);
  padding:14px 16px;
  font-family:'Raleway',sans-serif;font-weight:500;
  font-size:14.5px;color:var(--text);outline:none;
  transition:border-color .18s,box-shadow .18s;
}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,98,27,.12)}
.field textarea{resize:vertical;min-height:72px}
.cta-row{display:flex;flex-wrap:wrap;gap:8px}
.cta-opt{
  padding:10px 16px;
  border:1.5px solid var(--muted);background:#fff;
  border-radius:99px;cursor:pointer;
  font-size:13.5px;font-weight:600;color:var(--text);
  transition:border-color .18s,background .18s,color .18s;
}
.cta-opt:hover{border-color:var(--accent-mild);color:var(--accent-text)}
.cta-opt.selected{background:var(--accent);border-color:var(--accent);color:#fff}

/* Этапы генерации */
.gen-steps{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.gen-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border:1px solid var(--muted);
  border-radius:var(--radius-16);background:#fff;
  transition:border-color .25s, background .25s;
}
.gen-row.in-progress{border-color:var(--accent-mild);background:var(--bg-select)}
.gen-row.done{border-color:#9fde9f;background:var(--alert-success-bg)}
.gen-row .gicon{
  width:32px;height:32px;border-radius:10px;
  background:var(--muted);color:var(--muted-hard);
  display:grid;place-items:center;flex:0 0 32px;
  font-size:13px;font-weight:700;
}
.gen-row.in-progress .gicon{background:#fff;color:var(--accent-text);border:1px solid var(--accent-mild)}
.gen-row.done .gicon{background:#3aa84e;color:#fff}
.gen-row .gtext{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.gen-row .gmeta{font-size:12px;color:var(--muted-hard);font-weight:600}
.gen-row.in-progress .gmeta{color:var(--accent-text)}
.gen-row.done .gmeta{color:#2c8d3e}
.spinner{width:20px;height:20px;border:2px solid var(--accent-mild);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.typing{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;background:var(--bg-select);border-radius:99px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typing 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

.step-actions{margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.hint{
  font-size:12.5px;color:var(--muted-hard);
  background:var(--bg-select);
  border:1px dashed var(--accent-mild);
  padding:8px 14px;border-radius:99px;
  display:inline-flex;align-items:center;gap:8px;
  font-weight:500;
}

.summary-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;background:#fff;border:1px solid var(--muted);
  border-radius:99px;font-size:12.5px;color:var(--text);
  margin-right:6px;margin-bottom:6px;font-weight:500;
}
.summary-pill strong{color:var(--accent-text);font-weight:700;margin-left:2px}

/* ======================================================================
   DASHBOARD
   ====================================================================== */
.dash-area{
  flex:1;display:flex;flex-direction:column;min-height:0;
  background:#fff3;
  border:1px solid #fff;
  border-radius:var(--radius-32);
  overflow:hidden;
}
.dash-tabs{
  display:flex;align-items:center;gap:6px;
  padding:14px 20px 0;
}
.dash-tab{
  padding:11px 18px;font-size:14px;font-weight:600;
  color:var(--muted-hard);
  border-radius:99px;
  cursor:pointer;transition:background .18s,color .18s;
  background:transparent;border:1px solid transparent;
}
.dash-tab:hover{background:var(--card-bg)}
.dash-tab.active{background:var(--accent-text);color:#fff}
.dash-tab .count{
  display:inline-block;margin-left:8px;
  font-size:11px;padding:1px 8px;border-radius:99px;
  background:#fff;color:var(--accent-text);font-weight:700;
}
.dash-tab:not(.active) .count{background:#fff;color:var(--muted-hard)}
.dash-section-title{
  font-size:11px;text-transform:uppercase;
  color:var(--text-muted);font-weight:700;letter-spacing:.06em;
  margin:18px 0 12px;padding:0 4px;
}
.dash-body{padding:14px 20px 22px;flex:1;overflow:auto}
.asset-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.asset-card{
  background:var(--bg-input);border:1px solid #fff;
  border-radius:var(--radius-24);overflow:hidden;
  display:flex;flex-direction:column;
  transition:background .18s, transform .12s, box-shadow .18s;
  cursor:pointer;
}
.asset-card:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 28px #14141414}
.asset-preview{background:#fff;position:relative;overflow:hidden}
.asset-preview.master{aspect-ratio:16/9}
.asset-info{padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.asset-name{font-weight:700;font-size:14px;color:var(--text);font-family:'Inter',sans-serif}
.asset-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted-hard);font-weight:500}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:700;
}
.badge.ok{background:var(--alert-success-bg);color:#2c8d3e}
.badge.warn{background:#fff4d8;color:#9c6b00}
.badge.brand{background:var(--accent-soft);color:var(--accent-text)}

/* ======================================================================
   BANNER COMPOSITION
   ====================================================================== */
.banner{
  position:relative;width:100%;height:100%;
  overflow:hidden;display:flex;
  background:#fff5ee;color:#1e1717;
}
.banner.master{aspect-ratio:16/9}
.banner-bg{
  position:absolute;inset:0;
  background:linear-gradient(120deg,#fff5ee 0%,#ffe0ce 60%,#ffd1b8 100%);
}
.banner-bg::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(255,255,255,.65),transparent 50%);
}
.banner-content{
  position:relative;z-index:2;flex:1;
  display:flex;align-items:center;
  padding:6%;gap:5%;
}
.banner-text{
  flex:1;min-width:0;display:flex;flex-direction:column;gap:.4em;
  max-width:55%;
}
.banner-eyebrow{
  font-size:.7em;text-transform:uppercase;letter-spacing:.2em;
  color:#b25320;font-weight:700;
  font-family:'Raleway',sans-serif;
}
.banner-h1{
  font-family:'Raleway',sans-serif;font-weight:800;
  font-size:2.4em;line-height:1.02;letter-spacing:-.01em;
  color:#1e1717;margin:0;
}
.banner-sub{font-size:1em;line-height:1.35;color:#4b3328;margin:0;font-weight:500}
.banner-cta{
  align-self:flex-start;margin-top:.5em;
  padding:.6em 1.2em;border-radius:99px;
  background:var(--accent);color:#fff;
  font-weight:700;font-size:.9em;letter-spacing:.01em;
  display:inline-flex;align-items:center;gap:.5em;
  box-shadow:0 6px 16px rgba(255,98,27,.3);
}
.banner-image{
  position:relative;flex:0 0 40%;height:82%;
  border-radius:20px;overflow:hidden;background:#fff;
  box-shadow:0 16px 44px rgba(102,40,5,.22);
}
.banner-image img{width:100%;height:100%;object-fit:cover;display:block}
.banner-image .placeholder{
  width:100%;height:100%;display:grid;place-items:center;
  background:linear-gradient(135deg,#fff0e2,#ffd6b8);color:#a04419;
}
.banner-logo{
  position:absolute;left:6%;top:6%;z-index:3;
  font-family:'Raleway',sans-serif;font-weight:800;font-size:.85em;
  letter-spacing:.06em;color:#1e1717;
  display:inline-flex;align-items:center;gap:.5em;
}
.banner-logo .logo-dot{
  width:1.2em;height:1.2em;border-radius:50%;
  background:var(--accent);display:inline-grid;place-items:center;
  color:#fff;font-size:.65em;font-weight:800;
}
.banner.vertical{aspect-ratio:690/996}
.banner.vertical .banner-content{flex-direction:column;justify-content:flex-end;padding:8%;gap:4%}
.banner.vertical .banner-image{flex:1 1 auto;width:100%;height:auto;max-height:55%;border-radius:16px}
.banner.vertical .banner-text{max-width:100%}
.banner.vertical .banner-h1{font-size:1.7em}
.banner.vertical .banner-sub{font-size:.85em}
.banner.vertical .banner-cta{font-size:.78em;padding:.5em .95em}
.banner.horiz{aspect-ratio:858/483}
.banner.horiz .banner-content{padding:5%;gap:4%}
.banner.horiz .banner-h1{font-size:1.75em}
.banner.horiz .banner-sub{font-size:.85em}
.banner.horiz .banner-cta{font-size:.8em}
.banner.horiz .banner-image{flex:0 0 38%;height:82%}
.banner.square{aspect-ratio:392/380}
.banner.square .banner-content{padding:6%;gap:3%}
.banner.square .banner-text{max-width:58%}
.banner.square .banner-h1{font-size:1.4em}
.banner.square .banner-sub{font-size:.78em}
.banner.square .banner-cta{font-size:.72em;padding:.45em .9em}
.banner.square .banner-image{flex:0 0 38%;height:80%;border-radius:14px}

/* ======================================================================
   LIGHTBOX
   ====================================================================== */
.overlay{
  position:fixed;inset:0;
  background:#13131340;
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:50;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.overlay.show{opacity:1;pointer-events:auto}
.lightbox{
  background:#fff;
  border:1px solid #fff;
  border-radius:var(--radius-32);
  box-shadow:0 24px 60px #14141426;
  max-width:1100px;width:calc(100% - 48px);max-height:92vh;
  display:grid;grid-template-columns:1fr 340px;
  overflow:hidden;
}
.lb-preview{
  background:linear-gradient(135deg,#fff2e8,#ffe1cc,#ffd0a8);
  display:flex;align-items:center;justify-content:center;
  padding:28px;overflow:auto;max-height:92vh;
}
.lb-preview .frame{
  width:100%;max-width:880px;max-height:80vh;
  display:flex;align-items:center;justify-content:center;
}
.lb-side{display:flex;flex-direction:column;border-left:1px solid var(--muted)}
.lb-head{
  padding:20px 22px;border-bottom:1px solid var(--muted);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.lb-title{font-weight:700;font-size:15px;font-family:'Inter',sans-serif;color:var(--text)}
.lb-sub{font-size:12px;color:var(--muted-hard);margin-top:3px;font-weight:500}
.lb-close{
  border:none;background:var(--card-bg);color:var(--text);
  width:34px;height:34px;border-radius:10px;
  display:grid;place-items:center;cursor:pointer;
  transition:background .18s;
}
.lb-close:hover{background:var(--muted)}
.lb-body{padding:18px 22px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px}
.info-row{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  font-size:13px;padding:6px 0;border-bottom:1px solid var(--table-sep);
}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--muted-hard);font-weight:500}
.info-row .v{font-weight:700;color:var(--text);text-align:right}
.lb-footer{
  padding:16px 22px;border-top:1px solid var(--muted);
  display:flex;flex-direction:column;gap:8px;
}

function loadScenarios(){
  try{
    const raw = localStorage.getItem(SCENARIOS_STORAGE_KEY);
    if (!raw) return SCENARIOS_DEFAULT;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved) || saved.length === 0) return SCENARIOS_DEFAULT;
    // Объединяем: по id берём поля из saved, иконку и фолбэки — из default
    return SCENARIOS_DEFAULT.map(def => {
      const s = saved.find(x => x.id === def.id) || {};
      return Object.assign({}, def, s, { ico: s.ico || def.ico });
    });
  }catch(e){ return SCENARIOS_DEFAULT; }
}

const $$ = (s,p=document)=>Array.from(p.querySelectorAll(s));
const el = (tag, props={}, ...children) => {
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "dataset") Object.assign(node.dataset, v);
    else if (v !== false && v != null) node.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
};

};
const fmtBytes = (b) => {
  if (!b && b!==0) return "—";
  if (b<1024) return b+" B";
  if (b<1024*1024) return (b/1024).toFixed(1)+" KB";

};

function aibPaintChatLog(){
  const stage = document.getElementById("aibChatStage");
  if (!stage) return;
  stage.innerHTML = "";
  aibState.log.forEach(m => {
    stage.appendChild(aibBuildMsg(m));
  });
  // прокрутка вниз
  const scroll = document.getElementById("aibChatScroll");
  if (scroll) scroll.scrollTop = scroll.scrollHeight;
}

function aibBuildMsg(m){
  const wrap = el("div", {class:"aib-msg " + m.role});
  wrap.appendChild(el("div", {class:"ava"}, m.role === "ai" ? "Л" : "Я"));
  wrap.appendChild(el("div", {class:"bubble"},
    el("div", {class:"who"}, m.role === "ai" ? "Нестор · AI-стратег" : "Вы"),
    el("div", {class:"body"}, el("p", {}, m.text))
  ));
  return wrap;
}

function aibAddAITyping(){
  const stage = document.getElementById("aibChatStage");
  if (!stage) return null;
  const typing = el("div", {class:"aib-msg ai", id:"aibTyping"},
    el("div", {class:"ava"}, "Л"),
    el("div", {class:"bubble"}, el("div", {class:"aib-typing"}, el("span"), el("span"), el("span")))
  );
  stage.appendChild(typing);
  const scroll = document.getElementById("aibChatScroll");
  if (scroll) scroll.scrollTop = scroll.scrollHeight;
  return typing;
}

function aibAskCurrentQuestion(){
  if (aibState.turn >= AIB_SCRIPT.length) return;
  const turn = AIB_SCRIPT[aibState.turn];
  const typing = aibAddAITyping();
  setTimeout(() => {
    if (typing && typing.parentNode) typing.parentNode.removeChild(typing);
    aibState.log.push({ role:"ai", text: turn.ai });
    aibPaintChatLog();
    // chips после AI-сообщения
    setTimeout(() => aibRenderChips(turn.chips), 120);
  }, 700);
}

function aibRenderChips(chips){
  const stage = document.getElementById("aibChatStage");
  if (!stage) return;
  // удалим прошлые чипы
  const old = stage.querySelector(".aib-chips");
  if (old) old.remove();
  const wrap = el("div", {class:"aib-chips"});
  chips.forEach(ch => {
    const c = el("button", {class:"aib-chip" + (ch.primary ? " suggested" : "")});
    if (ch.primary){
      c.appendChild(el("span", {html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>'}));
    }
    c.appendChild(document.createTextNode(ch.text));
    c.addEventListener("click", () => {
      aibUserSend(ch.text, ch.action);
    });
    wrap.appendChild(c);
  });
  stage.appendChild(wrap);
  const scroll = document.getElementById("aibChatScroll");
  if (scroll) scroll.scrollTop = scroll.scrollHeight;
}

function aibUserSend(text, action){
  // убрать chips
  const stage = document.getElementById("aibChatStage");
  const chips = stage && stage.querySelector(".aib-chips");
  if (chips) chips.remove();

  aibState.log.push({ role:"user", text });
  aibPaintChatLog();

  // обработать действие финального чипа
  if (action === "finish"){
    setTimeout(() => {
      state.screen = "ai-brief-done";
      render();
    }, 600);
    return;
  }

  // применить fill-секции для текущего хода (если есть)
  const turn = AIB_SCRIPT[aibState.turn];
  if (turn && turn.fill && turn.fill.length){
    turn.fill.forEach((f, idx) => {
      setTimeout(() => aibFillSection(f.id, f.content, f.confidence), 400 + idx*420);
    });
  }

  // следующий ход
  aibState.turn += 1;
  if (aibState.turn < AIB_SCRIPT.length){
    setTimeout(() => aibAskCurrentQuestion(), 1100 + (turn.fill ? turn.fill.length*420 : 0));
  }
}

function aibFillSection(id, content, confidence){
  const sec = aibState.sections.find(s => s.id === id);
  if (!sec) return;
  // 1) перевести в filling
  sec.status = "filling";
  aibPaintDoc();
  // 2) через паузу — заполнить
  setTimeout(() => {
    sec.content = content;
    sec.confidence = confidence || "med";
    sec.status = "filled";
    aibPaintDoc();
    // разблокировать финальную кнопку
    const finish = document.getElementById("aibFinishBtn");
    if (finish && aibProgress() >= 75) finish.disabled = false;
  }, 900);
}

function aibPaintDoc(){
  const stage = document.getElementById("aibDocStage");
  if (!stage) return;
  stage.innerHTML = "";
  aibState.sections.forEach(s => {
    stage.appendChild(buildAIBDocSection(s));
  });
  // smart recommendation внизу
  const filledCount = aibState.sections.filter(s => s.status === "filled").length;
  if (filledCount >= 3){
    stage.appendChild(buildAIBRecommendation());
  }
  // progress
  const p = aibProgress();
  const bar = document.getElementById("aibProgressBar");
  const val = document.getElementById("aibProgressVal");
  if (bar) bar.style.width = p + "%";
  if (val) val.innerHTML = '<b>' + p + '</b>%';

  const finish = document.getElementById("aibFinishBtn");
  if (finish) finish.disabled = (p < 75);
}

function buildAIBDocSection(s){
  const wrap = el("div", {class:"aib-doc-section " + s.status});
  const head = el("div", {class:"aib-doc-section-head"});
  const title = el("div", {class:"aib-doc-section-title"},
    el("span", {class:"n"}, String(s.n)),
    s.title
  );
  head.appendChild(title);

  let conf;
  if (s.status === "filled"){
    const c = s.confidence || "med";
    const lbl = c === "high" ? "high" : (c === "med" ? "med" : "low");
    conf = el("span", {class:"aib-conf " + lbl},
      el("span", {html:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'}),
      "confidence · " + lbl
    );
  } else if (s.status === "filling"){
    conf = el("span", {class:"aib-conf med"},
      el("span", {html:'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'}),
      "анализируется…"
    );
  } else {
    conf = el("span", {class:"aib-conf low"}, "требуется больше данных");
  }
  head.appendChild(conf);
  wrap.appendChild(head);

  const body = el("div", {class:"aib-doc-section-body" + (s.status === "filled" ? "" : " empty")});
  if (s.status === "filled" && s.content){
    if (s.content.type === "text"){
      body.appendChild(el("p", {}, s.content.value));
    } else if (s.content.type === "list"){
      const ul = el("ul");
      s.content.value.forEach(item => ul.appendChild(el("li", {}, item)));
      body.appendChild(ul);
    } else if (s.content.type === "swot"){
      const sw = el("div", {class:"aib-swot"});
      [["S · Strengths", s.content.s], ["W · Weaknesses", s.content.w],
       ["O · Opportunities", s.content.o], ["T · Threats", s.content.t]].forEach(([lbl, items]) => {
        const cell = el("div", {class:"aib-swot-cell"});
        cell.appendChild(el("b", {}, lbl));
        const ul = el("ul", {style:"margin:0;padding-left:14px"});
        items.forEach(it => ul.appendChild(el("li", {style:"font-size:12px;color:var(--text)"}, it)));
        cell.appendChild(ul);
        sw.appendChild(cell);
      });
      body.appendChild(sw);
    } else if (s.content.type === "kpi"){
      const list = el("div", {style:"display:flex;flex-direction:column;gap:6px;margin-top:4px"});
      s.content.value.forEach(k => {
        const row = el("div", {style:"display:flex;align-items:center;justify-content:space-between;font-size:13px;gap:10px;padding:6px 0;border-bottom:1px dashed var(--muted)"});
        row.appendChild(el("span", {style:"color:var(--text)"}, k.k));
        row.appendChild(el("span", {style:"color:var(--accent-text);font-weight:700;font-family:'Inter',sans-serif"}, k.v));
        list.appendChild(row);
      });
      body.appendChild(list);
    }
  } else if (s.status === "filling"){
    body.appendChild(el("span", {class:"ai-dot"}));
    body.appendChild(document.createTextNode("AI собирает данные из интервью…"));
  } else {
    body.appendChild(el("span", {class:"ai-dot"}));
    body.appendChild(document.createTextNode("Ждём ответ в интервью"));
  }
  wrap.appendChild(body);
  return wrap;
}

function buildAIBRecommendation(){
  const w = el("div", {class:"aib-recs"});

}

function renderMAStepper(active){
  const steps = ["Источники","Фильтры","Дайджест"];
  const wrap = el("div", {class:"mt-stepper"});
  steps.forEach((s, i)=>{
    const pip = el("div", {class:"step-pip" + (i < active ? " done" : i === active ? " active" : "")}, String(i+1));
    const lbl = el("span", {class:"step-label"}, s);
    const item = el("div", {class:"step-item"}, pip, lbl);
    wrap.appendChild(item);
    if (i < steps.length-1) wrap.appendChild(el("div", {class:"step-line"}));
  });
  return wrap;
}

function buildMACard(item){
  const scoreClass = item.score >= 80 ? "high" : item.score >= 65 ? "med" : "low";
  const card = el("div", {class:"ma-card" + (item.important ? " important" : "")});

  const head = el("div", {class:"ma-card-head"});
  if(item.important) head.appendChild(el("span", {class:"ma-important-flag"}, "⚡ Важно"));
  head.appendChild(el("div", {class:"ma-card-title"}, item.title));
  head.appendChild(el("span", {class:"ma-score " + scoreClass}, item.score + "%"));
  card.appendChild(head);

  card.appendChild(el("div", {class:"ma-card-summary"}, item.summary));

  const foot = el("div", {class:"ma-card-foot"});
  const cat = MA_CATEGORIES.find(c => c.id === item.cat);
  foot.appendChild(el("span", {class:"tag " + item.cat}, cat ? cat.label : item.cat));
  foot.appendChild(el("span", {style:"font-size:.75rem;color:var(--fg-muted)"}, item.date));
  const link = el("a", {class:"ma-src-link", href:item.sourceUrl, target:"_blank"}, item.source, " ↗");
  foot.appendChild(link);
  card.appendChild(foot);

  return card;
}

function renderMADigest(){
  const wrap = el("div", {class:"screen-wrap"});
  wrap.appendChild(renderTopbar({crumb:["Нестор","AI Анализатор СМИ"]}));
  const body = el("div", {class:"flow-body"});
  body.appendChild(renderMAStepper(2));

  // Filter news
  const filtered = MA_NEWS.filter(n =>
    maState.categories.has(n.cat) && n.score >= maState.minScore
  );
  const important = filtered.filter(n => n.important);

  // Stats bar
  const statsBar = el("div", {class:"ma-stats-bar"});
  statsBar.appendChild(el("div", {class:"ma-stat-pill"}, el("strong", {}, String(filtered.length)), " новостей найдено"));
  statsBar.appendChild(el("div", {class:"ma-stat-pill"}, el("strong", {}, String(maState.channels.size + maState.sites.size)), " источников"));
  statsBar.appendChild(el("div", {class:"ma-stat-pill"}, el("strong", {}, String(important.length)), " важных"));
  const topScore = filtered.length ? Math.max(...filtered.map(n => n.score)) : 0;
  statsBar.appendChild(el("div", {class:"ma-stat-pill"}, "топ релевантность ", el("strong", {}, topScore + "%")));
  body.appendChild(statsBar);

  // Filter tabs
  const tabs = [
    {id:"all",       label:"Все"},
    {id:"important", label:"⚡ Важные"},
    {id:"ad",        label:"Реклама"},
    {id:"ecom",      label:"E-commerce"},
    {id:"furniture", label:"Мебель"},
    {id:"competitor",label:"Конкуренты"},
  ];
  const tabBar = el("div", {class:"ma-filter-bar"});
  const feed = el("div", {class:"ma-feed"});

  function showTab(tid){
    maState.activeTab = tid;
    tabBar.querySelectorAll(".ma-ftab").forEach(t => t.classList.toggle("active", t.dataset.tab === tid));
    feed.innerHTML = "";
    const items = tid === "all" ? filtered :
                  tid === "important" ? filtered.filter(n => n.important) :
                  filtered.filter(n => n.cat === tid);
    if(items.length === 0){
      feed.appendChild(el("div", {style:"color:var(--fg-muted);font-size:.85rem;padding:20px 0;text-align:center"}, "Нет новостей по этому фильтру"));
    } else {
      items.forEach(n => feed.appendChild(buildMACard(n)));
    }
  }

  tabs.forEach(t => {
    const tab = el("div", {class:"ma-ftab" + (maState.activeTab === t.id ? " active" : "")});
    tab.dataset.tab = t.id;
    tab.textContent = t.label;
    tab.addEventListener("click", () => showTab(t.id));
    tabBar.appendChild(tab);
  });
  body.appendChild(tabBar);

  showTab(maState.activeTab);
  body.appendChild(feed);

  // New scan button
  const newBtn = el("button", {class:"ghost-btn", style:"margin-top:16px;width:100%"}, "← Новый анализ");
  newBtn.addEventListener("click", goToMediaAnalyzer);
  body.appendChild(newBtn);

  wrap.appendChild(body);
  return wrap;
}

function downloadMTTranscript(){
  const blob = new Blob([DEMO_TRANSCRIPT_TEXT], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "meeting_transcript.txt";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
  toast("Файл транскрибации скачивается…");
}

const STEP_LABELS = ["Бренд","Шаблон","Площадки","Ресайзы","Изображение","Текст","Генерация","Результаты"];

function renderStudioFlow(){
  const root = el("div", {class:"main", style:"gap:10px;display:flex;flex-direction:column;flex:1"});
  root.appendChild(renderTopbar({crumb:["Баннер-студия","Tasty Coffee","ЗАПУСК-2451-А"], showBack:true}));

  const stepper = el("div", {class:"stepper-wrap"});
  STEP_LABELS.forEach((label, i) => {
    const n = i+1;
    const cls = state.step > n ? "done" : (state.step === n ? "active" : "");
    stepper.appendChild(el("div", {class:"step-pip " + cls},
      el("span", {class:"num"}, state.step > n ? "✓" : String(n)),
      label
    ));
    if (i < STEP_LABELS.length - 1){
      stepper.appendChild(el("span", {class:"step-arrow", html:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'}));
    }
  });
  root.appendChild(stepper);

  const chatRoot = el("div", {class:"chat-root"});
  const chatArea = el("div", {class:"chat-area"});
  const scroll = el("div", {class:"chat-scroll", id:"chatScroll"});
  const stage = el("div", {class:"chat-stage", id:"chatStage"});
  scroll.appendChild(stage);
  chatArea.appendChild(scroll);
  chatRoot.appendChild(chatArea);
  root.appendChild(chatRoot);

  if (!state._chatLog) state._chatLog = [];
  state._chatLog.forEach(node => stage.appendChild(node));

  if (!state._renderedSteps) state._renderedSteps = new Set();
  if (!state._renderedSteps.has(state.step)){
    state._renderedSteps.add(state.step);
    queueStep(state.step, stage, scroll);
  } else {
    requestAnimationFrame(() => scroll.scrollTop = scroll.scrollHeight);
  }
  return root;
}

function queueStep(step, stage, scroll){
  const typing = el("div", {class:"msg ai"},
    el("div", {class:"ava"}, "Л"),
    el("div", {class:"bubble"}, el("div", {class:"typing"}, el("span"), el("span"), el("span")))
  );
  stage.appendChild(typing);
  state._chatLog.push(typing);
  requestAnimationFrame(() => scroll.scrollTop = scroll.scrollHeight);

  setTimeout(() => {
    stage.removeChild(typing);
    state._chatLog = state._chatLog.filter(n => n !== typing);
    const ai = renderStepBubble(step);
    stage.appendChild(ai);
    state._chatLog.push(ai);
    requestAnimationFrame(() => scroll.scrollTop = scroll.scrollHeight);
  }, 680);
}

function renderStepBubble(step){
  const wrap = el("div", {class:"msg ai"}, el("div", {class:"ava"}, "Л"));
  const bubble = el("div", {class:"bubble"});
  bubble.appendChild(el("div", {class:"who"}, "Нестор · Шаг " + step + " из 8 · " + STEP_LABELS[step-1]));
  const body = el("div", {class:"body"});

  switch(step){
    case 1: renderStep1(body); break;
    case 2: renderStep2(body); break;
    case 3: renderStep3(body); break;
    case 4: renderStep4(body); break;
    case 5: renderStep5(body); break;
    case 6: renderStep6(body); break;
    case 7: renderStep7(body); break;
    case 8: renderStep8(body); break;
  }
  bubble.appendChild(body);
  wrap.appendChild(bubble);
  return wrap;
}

function renderStep5(body){
  body.appendChild(el("p", {}, el("strong", {}, "5. Загрузите изображение для баннера.")));
  body.appendChild(el("p", {}, "Поддерживаются PNG, JPG, WEBP. Одно изображение — оно станет частью мастер-композиции и адаптируется под все ресайзы."));
  const drop = el("label", {class:"drop"});
  const input = el("input", {type:"file", accept:"image/png,image/jpeg,image/webp"});
  drop.appendChild(input);
  drop.appendChild(el("div", {class:"ico", html:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'}));
  drop.appendChild(el("h5", {}, "Перетащите изображение или нажмите, чтобы выбрать"));
  drop.appendChild(el("p", {}, "PNG · JPG · WEBP · до 10 МБ"));
  body.appendChild(drop);
  const fileSlot = el("div");
  body.appendChild(fileSlot);
  const actions = el("div", {class:"step-actions"});
  const next = el("button", {class:"primary-btn", disabled: !state.selections.uploadedImage}, "Далее");
  const skip = el("button", {class:"ghost-btn"}, "Пропустить (использовать заглушку)");
  actions.appendChild(next);
  actions.appendChild(skip);
  actions.appendChild(el("span", {class:"hint"}, "Можно пропустить — подставим стандартное изображение Tasty Coffee."));
  body.appendChild(actions);

  function handleFile(file){
    if (!file) return;
    if (!/image\/(png|jpe?g|webp)/.test(file.type)){ toast("Неподдерживаемый формат. Нужны PNG, JPG или WEBP."); return; }
    drop.classList.add("has-file");
    state.selections.uploadedFileName = file.name;
    state.selections.uploadedFileSize = file.size;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      state.selections.uploadedImage = dataUrl;
      fileSlot.innerHTML = "";
      const card = el("div", {class:"file-card"});
      const thumb = el("div", {class:"file-thumb"});
      thumb.appendChild(el("img", {src:dataUrl, alt:""}));
      card.appendChild(thumb);
      const info = el("div", {class:"file-info"});
      info.appendChild(el("div", {class:"file-name"}, file.name));
      info.appendChild(el("div", {class:"file-meta"}, fmtBytes(file.size) + " · загружено локально"));
      const pr = el("div", {class:"progress"});
      const bar = el("span");
      pr.appendChild(bar);
      info.appendChild(pr);
      card.appendChild(info);
      fileSlot.appendChild(card);
      let p = 0;
      const tick = setInterval(() => {
        p += 8 + Math.random()*16;
        if (p >= 100){ p = 100; clearInterval(tick); next.disabled = false; toast("Изображение готово к композиции"); }
        bar.style.width = p + "%";
      }, 80);
    };
    reader.readAsDataURL(file);
  }
  input.addEventListener("change", (e) => handleFile(e.target.files && e.target.files[0]));
  drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.style.background = "var(--bg-select)"; });
  drop.addEventListener("dragleave", () => { drop.style.background = ""; });
  drop.addEventListener("drop", (e) => { e.preventDefault(); drop.style.background = ""; handleFile(e.dataTransfer.files && e.dataTransfer.files[0]); });

  next.addEventListener("click", () => {
    addUserMsg(state.selections.uploadedFileName ? ("Загрузил " + state.selections.uploadedFileName) : "Использую заглушку");
    advanceTo(6);
  });
  skip.addEventListener("click", () => {
    state.selections.uploadedImage = null;
    addUserMsg("Использую дефолтное изображение Tasty Coffee");
    advanceTo(6);
  });

  if (state.selections.uploadedImage){
    drop.classList.add("has-file");
    next.disabled = false;
    const card = el("div", {class:"file-card"});
    const thumb = el("div", {class:"file-thumb"});
    thumb.appendChild(el("img", {src:state.selections.uploadedImage, alt:""}));
    card.appendChild(thumb);
    card.appendChild(el("div", {class:"file-info"},
      el("div", {class:"file-name"}, state.selections.uploadedFileName || "image.png"),
      el("div", {class:"file-meta"}, fmtBytes(state.selections.uploadedFileSize) + " · загружено")
    ));
    fileSlot.appendChild(card);
  }
}

    ));
  }
  content.appendChild(text);
  const img = el("div", {class:"banner-image"});
  if (state.selections.uploadedImage){
    img.appendChild(el("img", {src: state.selections.uploadedImage, alt:""}));
  } else {
    img.appendChild(buildCoffeePlaceholder());
  }
  content.appendChild(img);
  root.appendChild(content);
  setTimeout(() => {
    const w = root.getBoundingClientRect().width;
    if (cls === "master") root.style.fontSize = (w/40) + "px";
    else if (cls === "vertical") root.style.fontSize = (w/22) + "px";
    else if (cls === "horiz") root.style.fontSize = (w/28) + "px";
    else if (cls === "square") root.style.fontSize = (w/24) + "px";
  }, 0);
  return root;
}

function buildCoffeePlaceholder(){
  const wrap = el("div", {class:"placeholder"});
  wrap.innerHTML = `
    <svg viewBox="0 0 200 240" width="80%" height="80%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3b2218"/>
          <stop offset="100%" stop-color="#1a0e09"/>
        </linearGradient>
      </defs>
      <rect x="40" y="40" width="120" height="170" rx="10" fill="url(#bag)"/>
      <rect x="40" y="40" width="120" height="36" fill="#cc4d15"/>
      <rect x="40" y="80" width="120" height="4" fill="#ff621b"/>
      <text x="100" y="64" font-family="Raleway,Arial" font-weight="800" font-size="18" fill="#fff" text-anchor="middle">TASTY</text>
      <text x="100" y="140" font-family="Raleway,Arial" font-weight="700" font-size="14" fill="#ffd1b8" text-anchor="middle">SPRING</text>
      <text x="100" y="160" font-family="Raleway,Arial" font-weight="700" font-size="14" fill="#ffd1b8" text-anchor="middle">HARVEST</text>
      <circle cx="100" cy="190" r="8" fill="#ff621b"/>
    </svg>`;
  return wrap;
}

/* ======================================================================
   LIGHTBOX
   ====================================================================== */
function openLightbox({ size = "master", resize = null } = {}){
  const overlay = $("#overlay");
  const frame = $("#lbFrame");
  frame.innerHTML = "";
  frame.appendChild(buildBanner({ size }));

  let title, sub, dims, weight, file, model;
  if (size === "master"){
    title = "master-hero.png"; sub = "3840 × 2160 · 6.4 MB";
    dims = "3840 × 2160"; weight = "6.4 MB"; file = "master-hero.png"; model = "Studio Compose · v1";
  } else {
    title = resize.file; sub = resize.w + " × " + resize.h + " · " + resize.size;
    dims = resize.w + " × " + resize.h; weight = resize.size; file = resize.file; model = "Auto-resize · " + resize.label;
  }
  $("#lbTitle").textContent = title;
  $("#lbSub").textContent = sub;

  const body = $("#lbBody");
  body.innerHTML = "";
  const rows = [
    ["Файл", file],
    ["Размер", dims],
    ["Вес", weight],
    ["Brand check", "пройден"],
    ["Контраст", "AA"],
    ["Дата генерации", "21.05.2026, 11:42"],
    ["Режим", model],
    ["Бренд", state.selections.brand ? state.selections.brand.name : "Tasty Coffee"],
    ["Сессия", "ЗАПУСК-2451-А"],
  ];
  rows.forEach(([k,v]) => {
    body.appendChild(el("div", {class:"info-row"},
      el("span", {class:"k"}, k),
      el("span", {class:"v"}, v)
    ));
  });

  overlay.classList.add("show");
  $("#lbDownload").onclick = () => toast("Скачивание начато: " + file);
  $("#lbCopy").onclick = () => toast("Ссылка на " + file + " скопирована");
  $("#lbEdit").onclick = () => toast("Редактор откроется в следующей версии");
}
$("#lbClose").addEventListener("click", () => $("#overlay").classList.remove("show"));
$("#overlay").addEventListener("click", (e) => { if (e.target.id === "overlay") $("#overlay").classList.remove("show"); });

/* ======================================================================
   SIDEBAR — обработчики
   ====================================================================== */
$("#newSessionBtn").addEventListener("click", () => {
  state.step = 0;
  state.selections = {
    brand: null, template: null, platform: null, resizes:["square","vertical","horiz"],
    uploadedImage:null, uploadedFileName:null, uploadedFileSize:null,
    headline:"Весенний урожай", subheadline:"Новая обжарка уже в каталоге", cta:"Заказать"
  };
  state._chatLog = [];
  state._renderedSteps = new Set();
  state._dashTab = "master";
  state.screen = "studio-start";
  render();
  toast("Создана новая сессия");
});

$$(".nav li").forEach(li => {
  li.addEventListener("click", () => {
    $$(".nav li").forEach(x => x.classList.remove("active"));
    li.classList.add("active");
    const section = li.dataset.section;
    if (section === "studio") goToStudio();
    else toast("Раздел «" + li.textContent.trim().replace(/\s+demo$/i,'') + "» — заглушка в демо");
  });
});
$(".brand").addEventListener("click", () => { state.screen = "nestor-home"; render(); });
$("#recentList").addEventListener("click", (e) => {
  const item = e.target.closest(".recent-item");
  if (!item) return;
  toast("Сессия открыта (в демо доступна только Tasty Coffee · Весенний запуск)");
});

/* ======================================================================
   СТАРТ
   ====================================================================== */
render();

/* ======================================================================
   АДМИН-ПАНЕЛЬ (редактор сценариев)
   Триггеры: ?admin=1 в URL, либо Ctrl+Shift+A. Иконка-«шестерёнка» внизу
   справа появляется только если админка хоть раз была открыта в этой
   сессии (или активирован URL-параметр).
   ====================================================================== */
let _adminWorking = null; // черновик правок до сохранения
let _adminAvailable = false;

function ensureAdminUI(){
  if (document.getElementById("adminDrawer")) return;
  document.body.insertAdjacentHTML("beforeend", `
    <button id="adminToggle" class="admin-toggle hidden" title="Редактор сценариев (Ctrl+Shift+A)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <div id="adminOverlay" class="admin-overlay"></div>
    <aside id="adminDrawer" class="admin-drawer" aria-hidden="true">
      <div class="admin-head">
        <h2>
          <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>
          <span>Редактор сценариев<span class="sub">Только для подготовки демонстрации · хранится локально</span></span>
        </h2>
        <button class="admin-close" id="adminClose" aria-label="Закрыть">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="admin-body" id="adminBody"></div>
      <div class="admin-footer">
        <button class="primary-btn" id="adminSave">Сохранить</button>
        <button class="ghost-btn" id="adminReset">Сбросить</button>
        <button class="ghost-btn" id="adminExport">Экспорт JSON</button>
      </div>
    </aside>
    <div id="adminToast" class="admin-toast"></div>
  `);

  document.getElementById("adminToggle").addEventListener("click", openAdmin);
  document.getElementById("adminClose").addEventListener("click", closeAdmin);
  document.getElementById("adminOverlay").addEventListener("click", closeAdmin);
  document.getElementById("adminSave").addEventListener("click", saveFromDraft);
  document.getElementById("adminReset").addEventListener("click", () => {
    if (!confirm("Сбросить все правки сценариев к стандартному виду?")) return;
    resetScenarios();
    _adminWorking = JSON.parse(JSON.stringify(SCENARIOS_DEFAULT));
    renderAdminCards();
    rerenderHome();
    adminToast("Сброшено к дефолту");
  });
  document.getElementById("adminExport").addEventListener("click", exportJSON);

  // hotkey
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === "A" || e.key === "a" || e.code === "KeyA")){
      e.preventDefault();
      _adminAvailable = true;
      document.getElementById("adminToggle").classList.remove("hidden");
      openAdmin();
    }
    if (e.key === "Escape"){
      const d = document.getElementById("adminDrawer");
      if (d && d.classList.contains("show")) closeAdmin();
    }
  });
}

function showAdminToggle(){
  _adminAvailable = true;
  ensureAdminUI();
  document.getElementById("adminToggle").classList.remove("hidden");
}

function adminToast(msg){
  const t = document.getElementById("adminToast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 1800);
}

function openAdmin(){
  ensureAdminUI();
  // черновик из текущего сохранённого (или дефолтного)
  _adminWorking = JSON.parse(JSON.stringify(loadScenarios()));
  renderAdminCards();
  document.getElementById("adminOverlay").classList.add("show");
  const d = document.getElementById("adminDrawer");
  d.classList.add("show");
  d.setAttribute("aria-hidden","false");
}

function closeAdmin(){
  const d = document.getElementById("adminDrawer");
  if (!d) return;
  d.classList.remove("show");
  d.setAttribute("aria-hidden","true");
  document.getElementById("adminOverlay").classList.remove("show");
}

function renderAdminCards(){
  const body = document.getElementById("adminBody");
  body.innerHTML = "";
  _adminWorking.forEach((s, i) => {
    body.appendChild(buildAdminCard(s, i));
  });
}

function buildAdminCard(s, i){
  const wrap = el("div", {class:"admin-card" + (s.featured ? " featured" : "")});

  const head = el("div", {class:"admin-card-head"});
  head.appendChild(el("div", {class:"admin-card-title"}, "Карточка " + (i+1) + " · id: " + s.id));
  if (s.featured) head.appendChild(el("span", {class:"admin-card-badge"}, "featured"));
  if (s.demo)     head.appendChild(el("span", {class:"admin-card-badge"}, "demo"));
  wrap.appendChild(head);

  // title
  const fTitle = el("div", {class:"admin-field"});
  fTitle.appendChild(el("label", {}, "Заголовок"));
  const inTitle = el("input", {type:"text", value:s.h || ""});
  inTitle.addEventListener("input", (e) => { _adminWorking[i].h = e.target.value; livePreview(); });
  fTitle.appendChild(inTitle);
  wrap.appendChild(fTitle);

  // description
  const fDesc = el("div", {class:"admin-field"});
  fDesc.appendChild(el("label", {}, "Описание"));
  const taDesc = el("textarea", {});
  taDesc.value = s.p || "";
  taDesc.addEventListener("input", (e) => { _adminWorking[i].p = e.target.value; livePreview(); });
  fDesc.appendChild(taDesc);
  wrap.appendChild(fDesc);

  // steps + coverPos
  const row2 = el("div", {class:"admin-row2"});
  const fSteps = el("div", {class:"admin-field"});
  fSteps.appendChild(el("label", {}, "Кол-во шагов"));
  const inSteps = el("input", {type:"text", value:s.steps || "", placeholder:"например, «6 шагов»"});
  inSteps.addEventListener("input", (e) => { _adminWorking[i].steps = e.target.value; livePreview(); });
  fSteps.appendChild(inSteps);
  row2.appendChild(fSteps);

  const fPos = el("div", {class:"admin-field"});
  fPos.appendChild(el("label", {}, "Позиция подложки"));
  const inPos = el("input", {type:"text", value:s.coverPos || "center", placeholder:"center / top / 70% 20%"});
  inPos.addEventListener("input", (e) => { _adminWorking[i].coverPos = e.target.value; livePreview(); });
  fPos.appendChild(inPos);
  row2.appendChild(fPos);
  wrap.appendChild(row2);

  // cover
  const fCover = el("div", {class:"admin-field"});
  fCover.appendChild(el("label", {}, "Картинка-подложка"));
  const block = el("div", {class:"admin-cover-block"});
  const thumb = el("div", {class:"admin-cover-thumb"});
  if (s.cover) thumb.style.backgroundImage = "url('" + s.cover + "')";
  else thumb.textContent = "нет";
  block.appendChild(thumb);

  const ctrl = el("div", {class:"admin-cover-controls"});
  const urlIn = el("input", {class:"admin-url-input", type:"text", value: (s.cover && s.cover.startsWith("data:") ? "" : (s.cover || "")), placeholder:"URL картинки (https://…)"});
  urlIn.addEventListener("change", () => {
    const v = urlIn.value.trim();
    _adminWorking[i].cover = v;
    if (v) thumb.style.backgroundImage = "url('" + v + "')";
    else { thumb.style.backgroundImage = ""; thumb.textContent = "нет"; }
    livePreview();
  });
  ctrl.appendChild(urlIn);

  const row = el("div", {class:"row"});
  const upBtn = el("button", {class:"admin-mini-btn"},
    el("span", {html:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'}),
    "Загрузить файл"
  );
  const fileIn = el("input", {type:"file", accept:"image/png,image/jpeg,image/webp,image/svg+xml", style:"display:none"});
  upBtn.addEventListener("click", () => fileIn.click());
  fileIn.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (f.size > 1.5 * 1024 * 1024){
      adminToast("Файл больше 1.5 МБ — может не уместиться в localStorage");
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const data = ev.target.result;
      _adminWorking[i].cover = data;
      thumb.style.backgroundImage = "url('" + data + "')";
      thumb.textContent = "";
      urlIn.value = "";
      livePreview();
    };
    reader.readAsDataURL(f);
  });
  row.appendChild(upBtn);
  row.appendChild(fileIn);

  const clearBtn = el("button", {class:"admin-mini-btn danger"}, "Убрать");
  clearBtn.addEventListener("click", () => {
    _adminWorking[i].cover = "";
    urlIn.value = "";
    thumb.style.backgroundImage = "";
    thumb.textContent = "нет";
    livePreview();
  });
  row.appendChild(clearBtn);
  ctrl.appendChild(row);
  block.appendChild(ctrl);
  fCover.appendChild(block);
  wrap.appendChild(fCover);

  return wrap;
}

function livePreview(){
  // Записываем черновик во временный «прокси» и перерисовываем home, если он сейчас открыт
  const tmpKey = SCENARIOS_STORAGE_KEY + "_preview";
  // Используем тот же ключ хранилища временно
  try{ localStorage.setItem(SCENARIOS_STORAGE_KEY, JSON.stringify(_adminWorking)); }catch(e){}
  rerenderHome();
}

function rerenderHome(){
  if (state.screen === "nestor-home") render();
}

function saveFromDraft(){
  const ok = saveScenarios(_adminWorking);
  if (!ok){ adminToast("localStorage переполнен. Попробуй URL картинок вместо файлов"); return; }
  rerenderHome();
  adminToast("Сохранено · видно на главной");
}

function exportJSON(){
  const json = JSON.stringify(_adminWorking, null, 2);
  // показать в textarea внутри alert-замены? Сделаю модальное окно через стандартный prompt-like UI
  const ov = el("div", {class:"admin-overlay show", style:"z-index:130"});
  const box = el("div", {style:"background:#fff;border-radius:18px;padding:18px;max-width:680px;width:calc(100% - 48px);max-height:80vh;display:flex;flex-direction:column;gap:10px;box-shadow:0 24px 60px rgba(0,0,0,.25)"});
  box.appendChild(el("h3", {style:"margin:0;font-family:Raleway,sans-serif;font-weight:700;font-size:16px"}, "Экспорт сценариев"));
  box.appendChild(el("p", {style:"margin:0;font-size:13px;color:var(--muted-hard)"},
    "Скопируйте JSON ниже и замените значение ", el("code", {style:"background:var(--bg-select);padding:1px 5px;border-radius:4px"}, "SCENARIOS_DEFAULT"), " в коде для постоянной правки."
  ));
  const ta = el("textarea", {class:"export-area"});
  ta.value = json;
  box.appendChild(ta);
  const btnRow = el("div", {style:"display:flex;gap:8px;justify-content:flex-end"});
  const copyBtn = el("button", {class:"primary-btn", style:"height:38px;font-size:13px"}, "Скопировать");
  copyBtn.addEventListener("click", async () => {
    try{ await navigator.clipboard.writeText(json); adminToast("JSON скопирован в буфер"); }
    catch(e){ ta.select(); document.execCommand("copy"); adminToast("Скопировано"); }
  });
  const closeBtn = el("button", {class:"ghost-btn", style:"height:38px"}, "Закрыть");
  closeBtn.addEventListener("click", () => ov.remove());
  btnRow.appendChild(closeBtn);
  btnRow.appendChild(copyBtn);
  box.appendChild(btnRow);
  ov.appendChild(box);
  ov.addEventListener("click", (e) => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

// Активация админки: ?admin=1 в URL или Ctrl+Shift+A (см. ensureAdminUI)
(function initAdminAccess(){
  ensureAdminUI();
  const u = new URL(window.location.href);
  if (u.searchParams.get("admin") === "1"){
    showAdminToggle();
    // не открываем сразу drawer — пусть пользователь сам кликнет шестерёнку
  }
})();
</script>
</body>
